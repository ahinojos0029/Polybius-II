name: Multi-Platform Build and Release

on:
  push:
    tags:
      - "v*" # Triggers on release tags like v1.0.0
  workflow_dispatch: # Allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: POLYBIUS-II-Windows
            asset_extension: .zip
          - os: ubuntu-latest
            artifact_name: POLYBIUS-II-Linux
            asset_extension: .tar.gz
          - os: macos-latest
            artifact_name: POLYBIUS-II-macOS
            asset_extension: .zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Linux requires ALSA/PulseAudio audio dev headers for pygame mixer to compile
      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libpulse-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pypresence pyinstaller

      # Windows Build
      - name: Build Executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --onedir --windowed --icon=icon.ico main.py

      # Linux Build (.ico converts gracefully on PyInstaller)
      - name: Build Executable (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --noconfirm --onedir --icon=icon.ico main.py

      # macOS Build (Passes icon if available)
      - name: Build Executable (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --onedir --windowed --icon=icon.ico main.py

      # Archive Windows (.zip)
      - name: Compress Build (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Compress-Archive -Path dist/main/* -DestinationPath ${{ matrix.artifact_name }}${{ matrix.asset_extension }}

      # Archive Linux (.tar.gz)
      - name: Compress Build (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czvf ${{ matrix.artifact_name }}${{ matrix.asset_extension }} -C dist/main .

      # Archive macOS (.zip)
      - name: Compress Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist/main && zip -r ../../${{ matrix.artifact_name }}${{ matrix.asset_extension }} .

      # Upload platform assets to Release
      - name: Upload Assets to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact_name }}${{ matrix.asset_extension }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
