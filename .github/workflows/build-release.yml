name: Multi-Platform Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: POLYBIUS-Windows.zip
          - os: ubuntu-latest
            artifact_name: POLYBIUS-Linux.tar.gz
          - os: macos-latest
            artifact_name: POLYBIUS-macOS.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Linux dependencies needed for audio & Nuitka library linking
      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libpulse-dev libsdl2-dev patchelf

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pypresence pillow nuitka zstandard imageio

      # Windows Build
      - name: Build Executable (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m nuitka `
            --standalone `
            --windows-console-mode=disable `
            --windows-icon-from-ico=icon.ico `
            --assume-yes-for-downloads `
            --output-dir=dist `
            main.py

      # Linux Build
      - name: Build Executable (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m nuitka \
            --standalone \
            --linux-icon=icon.ico \
            --assume-yes-for-downloads \
            --output-dir=dist \
            main.py

      # macOS Build
      - name: Build Executable (macOS)
        if: runner.os == 'macos'
        run: |
          python -m nuitka \
            --standalone \
            --macos-create-app-bundle \
            --macos-app-icon=icon.ico \
            --assume-yes-for-downloads \
            --output-dir=dist \
            main.py

      # Windows Archive (Zipping the whole main.dist folder properly)
      - name: Compress Build (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Compress-Archive -Path dist/main.dist -DestinationPath POLYBIUS-Windows.zip

      # Linux Archive
      - name: Compress Build (Linux)
        if: runner.os == 'Linux'
        run: |
          DIST_DIR="$(find dist -maxdepth 1 -type d -name '*.dist' | head -n 1)"
          test -n "$DIST_DIR"
          tar -czvf POLYBIUS-Linux.tar.gz -C "$DIST_DIR" .

      # macOS Archive (.app bundle zip)
      - name: Compress Build (macOS)
        if: runner.os == 'macos'
        run: |
          cd dist && zip -r ../POLYBIUS-macOS.zip main.app

      - name: Upload Assets to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
